# =============================================================
# ARQUIVO: api.conf
# DESCRICAO: Virtual Host do Nginx para Proxy Reverso
# VM1 (Nginx) -> VM2 (API Node.js na porta 3000)
#
# INSTRUCOES DE INSTALACAO NA VM1:
#   1. Copie este arquivo para /etc/nginx/sites-available/api.conf
#   2. Crie o symlink: sudo ln -s /etc/nginx/sites-available/api.conf /etc/nginx/sites-enabled/api.conf
#   3. Teste a config: sudo nginx -t
#   4. Recarregue o Nginx: sudo systemctl reload nginx
#
# ATENCAO: NAO utilizar o arquivo /etc/nginx/sites-available/default
# =============================================================

server {
    listen 80;
    server_name _;

    # Logs especificos para este virtual host
    access_log /var/log/nginx/api.access.log;
    error_log  /var/log/nginx/api.error.log;

    location / {
        # Substitua IP_DA_VM2 pelo IP real da sua VM2
        # Exemplo: proxy_pass http://192.168.0.20:3000;
        proxy_pass http://192.168.1.25:3000;

        # Cabecalhos para o proxy reverso
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
